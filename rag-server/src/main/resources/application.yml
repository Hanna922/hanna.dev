spring:
  application:
    name: rag-server

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

rag:
  embedding:
    model: gemini-embedding-001
    dimension: 3072
  top-k: 5
  context-max-chars: 12000

qdrant:
  host: localhost
  grpc-port: 6334
  api-key:
  use-tls: false
  collection: hanna-dev-documents
  bootstrap-enabled: true

internal:
  header-name: X-Internal-Api-Key
  query-api-key: change-me
  admin-api-key: change-me
