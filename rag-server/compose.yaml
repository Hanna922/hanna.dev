services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-server:
    build:
      context: .
    depends_on:
      - qdrant
    ports:
      - "8080:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      QDRANT_COLLECTION: hanna-dev-documents
      RAG_EMBEDDING_MODEL: gemini-embedding-001
      RAG_EMBEDDING_DIMENSION: 3072
      RAG_TOP_K: 5
      RAG_CONTEXT_MAX_CHARS: 12000
      INTERNAL_QUERY_API_KEY: ${INTERNAL_QUERY_API_KEY:-change-me}
      INTERNAL_ADMIN_API_KEY: ${INTERNAL_ADMIN_API_KEY:-change-me}

volumes:
  qdrant_storage:
