services:
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  rag-server:
    build:
      context: .
    depends_on:
      - qdrant
    env_file:
      - ../.env
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334

volumes:
  qdrant_storage:
